<!doctype html>
<html lang="ja">
  <head>
    <title>Example Website</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Hiragino Mincho ProN", "Yu Mincho", "Georgia", serif;
        min-height: 100vh;
        background: linear-gradient(180deg,
          #a8d8ea 0%,
          #c9e8f5 32%,
          #e8f4e8 66%,
          #7ab648 66%,
          #5a8a3c 100%
        );
        overflow-x: hidden;
      }

      /* 雲 */
      .clouds {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 60%;
        pointer-events: none;
        z-index: 0;
      }

      .cloud {
        position: absolute;
        background: white;
        border-radius: 50px;
        opacity: 0.88;
        filter: blur(1px);
      }

      .cloud::before,
      .cloud::after {
        content: "";
        position: absolute;
        background: white;
        border-radius: 50%;
      }

      .c1 { width: 130px; height: 38px; top: 8%;  animation: drift 30s linear infinite; left: -160px; }
      .c1::before { width: 64px; height: 64px; top: -30px; left: 20px; }
      .c1::after  { width: 48px; height: 48px; top: -20px; left: 60px; }

      .c2 { width: 100px; height: 28px; top: 20%; animation: drift 42s linear infinite; animation-delay: -14s; left: -120px; opacity: 0.72; }
      .c2::before { width: 48px; height: 48px; top: -24px; left: 14px; }
      .c2::after  { width: 34px; height: 34px; top: -15px; left: 44px; }

      .c3 { width: 160px; height: 44px; top: 5%;  animation: drift 52s linear infinite; animation-delay: -22s; left: -180px; opacity: 0.62; }
      .c3::before { width: 76px; height: 76px; top: -38px; left: 24px; }
      .c3::after  { width: 56px; height: 56px; top: -26px; left: 76px; }

      .c4 { width: 90px; height: 24px; top: 14%; animation: drift 36s linear infinite; animation-delay: -8s; left: -110px; opacity: 0.55; }
      .c4::before { width: 42px; height: 42px; top: -20px; left: 10px; }
      .c4::after  { width: 30px; height: 30px; top: -13px; left: 38px; }

      @keyframes drift {
        from { transform: translateX(0); }
        to   { transform: translateX(calc(100vw + 220px)); }
      }

      /* 草 */
      .grass-layer {
        position: fixed;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 36%;
        pointer-events: none;
        z-index: 0;
        overflow: hidden;
      }

      .grass-blades {
        position: absolute;
        bottom: 0;
        width: 100%;
        display: flex;
        justify-content: space-around;
        align-items: flex-end;
      }

      .blade {
        width: 6px;
        background: linear-gradient(to top, #3d6b24, #7ab648);
        border-radius: 3px 3px 0 0;
        transform-origin: bottom center;
        animation: sway 3s ease-in-out infinite;
      }

      .blade:nth-child(even) { animation-direction: alternate-reverse; }
      .blade:nth-child(3n)   { animation-duration: 3.6s; }
      .blade:nth-child(5n)   { animation-duration: 2.7s; }

      @keyframes sway {
        0%, 100% { transform: rotate(-4deg); }
        50%       { transform: rotate(4deg); }
      }

      /* 木 */
      .tree {
        position: fixed;
        bottom: 32%;
        pointer-events: none;
        z-index: 1;
      }

      .tree-left  { left: 1%; }
      .tree-right { right: 1%; transform: scaleX(-1); }

      /* コンテンツ */
      main {
        position: relative;
        z-index: 10;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 60px 24px 80px;
        gap: 40px;
      }

      /* 共通カード */
      .ghibli-card {
        background: linear-gradient(160deg, #fdf3dc, #f5e6c0);
        border: 3px solid #c8a96e;
        border-radius: 20px;
        padding: 40px 36px;
        width: min(600px, 92vw);
        position: relative;
        box-shadow:
          0 8px 32px #0000002a,
          inset 0 1px 0 #fffde8,
          0 0 0 6px #e8d5a088;
        animation: fadeIn 0.7s ease both;
      }

      .ghibli-card::before {
        content: "";
        position: absolute;
        inset: 6px;
        border: 1px dashed #c8a96e66;
        border-radius: 14px;
        pointer-events: none;
      }

      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(28px) scale(0.97); }
        to   { opacity: 1; transform: translateY(0) scale(1); }
      }

      /* ヒーロー */
      .hero-card {
        text-align: center;
        animation-delay: 0s;
      }

      .hero-badge {
        display: inline-block;
        background: #e8d5a0;
        border: 1px solid #c8a96e;
        border-radius: 999px;
        padding: 5px 18px;
        font-size: 0.78rem;
        letter-spacing: 0.18em;
        color: #8a6a30;
        margin-bottom: 18px;
      }

      .hero-card h1 {
        font-size: clamp(2rem, 6vw, 3.4rem);
        font-weight: 700;
        color: #3d2b1f;
        letter-spacing: 0.06em;
        margin-bottom: 10px;
        text-shadow: 0 1px 0 #fff8e8;
      }

      .hero-card p {
        font-size: 1.05rem;
        color: #8a6a40;
        line-height: 1.8;
        margin-bottom: 28px;
        letter-spacing: 0.04em;
      }

      .mascot-wrapper img {
        width: 120px;
        height: 120px;
        object-fit: contain;
        filter: drop-shadow(0 4px 16px #c8a96e88);
        animation: bobble 3.5s ease-in-out infinite;
      }

      @keyframes bobble {
        0%, 100% { transform: translateY(0); }
        50%       { transform: translateY(-10px); }
      }

      /* 天気 */
      .weather-card { animation-delay: 0.15s; }

      .section-title {
        text-align: center;
        font-size: 0.82rem;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: #9a7a40;
        margin-bottom: 20px;
      }

      .weather-inner {
        display: flex;
        align-items: center;
        gap: 20px;
        background: #fffbf0;
        border: 2px solid #c8a96e;
        border-radius: 12px;
        padding: 20px 24px;
      }

      .weather-icon {
        font-size: 3.4rem;
        line-height: 1;
        flex-shrink: 0;
      }

      .weather-temp {
        font-size: 2.4rem;
        font-weight: 700;
        color: #3d2b1f;
        line-height: 1;
        margin-bottom: 4px;
      }

      .weather-desc {
        font-size: 1rem;
        color: #6a4a20;
        margin-bottom: 4px;
      }

      .weather-location {
        font-size: 0.8rem;
        color: #9a7a50;
      }

      .weather-loading {
        font-size: 0.95rem;
        color: #9a7a50;
        text-align: center;
        width: 100%;
        padding: 8px 0;
      }

      .weather-error {
        font-size: 0.9rem;
        color: #8a4a30;
        text-align: center;
        width: 100%;
      }

      /* ポケモン占い */
      .fortune-card { animation-delay: 0.25s; }

      .fortune-btn {
        display: block;
        margin: 0 auto 24px;
        background: linear-gradient(160deg, #6a9a3a, #4a7a22);
        color: #f5f0e0;
        border: 2px solid #3a6014;
        border-radius: 10px;
        padding: 12px 32px;
        font-size: 1rem;
        font-family: inherit;
        font-weight: 700;
        cursor: pointer;
        letter-spacing: 0.06em;
        box-shadow: 0 3px 0 #2d4e10;
        transition: filter 0.15s, transform 0.15s;
      }

      .fortune-btn:hover  { filter: brightness(1.1); }
      .fortune-btn:active { box-shadow: none; transform: translateY(3px); }

      .fortune-result {
        display: none;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        animation: fadeIn 0.5s ease both;
      }

      .fortune-result.show { display: flex; }

      .fortune-pokemon-img {
        width: 120px;
        height: 120px;
        object-fit: contain;
        filter: drop-shadow(0 4px 10px #c8a96e66);
        animation: bobble 3s ease-in-out infinite;
      }

      .fortune-name {
        font-size: 1.3rem;
        font-weight: 700;
        color: #3d2b1f;
        letter-spacing: 0.06em;
        text-shadow: 0 1px 0 #fff8e8;
      }

      .fortune-number {
        font-size: 0.78rem;
        color: #c8a96e;
        letter-spacing: 0.1em;
        margin-top: -8px;
      }

      .fortune-types {
        display: flex;
        gap: 6px;
      }

      .fortune-type-badge {
        font-size: 0.72rem;
        font-weight: 700;
        padding: 3px 10px;
        border-radius: 999px;
        color: white;
        text-shadow: 0 1px 2px #0004;
        letter-spacing: 0.04em;
      }

      .fortune-message {
        background: #fffbf0;
        border: 2px solid #c8a96e;
        border-radius: 12px;
        padding: 16px 20px;
        text-align: center;
        font-size: 0.95rem;
        color: #5a3a10;
        line-height: 1.8;
        letter-spacing: 0.03em;
        width: 100%;
      }

      .fortune-message .fortune-star {
        font-size: 1.1rem;
        display: block;
        margin-bottom: 6px;
        color: #c8a030;
      }

      .fortune-loading {
        text-align: center;
        color: #9a7a50;
        font-size: 0.95rem;
        padding: 12px 0;
      }

      /* リンク */
      .links-card { animation-delay: 0.3s; }

      .link-items {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 14px;
      }

      .link-item {
        display: flex;
        align-items: center;
        gap: 14px;
        background: #fffbf0;
        border: 2px solid #c8a96e;
        border-radius: 12px;
        padding: 16px 20px;
        text-decoration: none;
        color: #3d2b1f;
        transition: background 0.2s, transform 0.2s, border-color 0.2s;
      }

      .link-item:hover {
        background: #f5e8c0;
        border-color: #9a7820;
        transform: translateY(-3px);
      }

      .link-icon {
        font-size: 1.7rem;
        flex-shrink: 0;
      }

      .link-text strong {
        display: block;
        font-size: 0.98rem;
        font-weight: 700;
        margin-bottom: 2px;
        letter-spacing: 0.03em;
      }

      .link-text span {
        font-size: 0.78rem;
        color: #9a7a50;
      }

      .link-arrow {
        margin-left: auto;
        color: #c8a96e;
        font-size: 1rem;
        transition: transform 0.2s, color 0.2s;
      }

      .link-item:hover .link-arrow {
        transform: translateX(4px);
        color: #6a4a10;
      }

      /* フッター */
      footer {
        position: relative;
        z-index: 10;
        text-align: center;
        padding: 16px 24px 32px;
        font-size: 0.78rem;
        color: #5a8a3c;
        letter-spacing: 0.08em;
      }

      /* 葉っぱ装飾 */
      .deco {
        position: absolute;
        font-size: 1.3rem;
        opacity: 0.5;
        pointer-events: none;
      }

      .deco-tl { top: 14px; left: 50px; transform: rotate(-18deg); }
      .deco-tr { top: 14px; right: 18px; transform: rotate(18deg); }
      .deco-bl { bottom: 16px; left: 18px; transform: rotate(12deg); }
      .deco-br { bottom: 16px; right: 18px; transform: rotate(-12deg); }
    </style>
  </head>
  <body>

    <!-- 雲 -->
    <div class="clouds">
      <div class="cloud c1"></div>
      <div class="cloud c2"></div>
      <div class="cloud c3"></div>
      <div class="cloud c4"></div>
    </div>

    <!-- 木（左） -->
    <div class="tree tree-left">
      <svg width="90" height="180" viewBox="0 0 80 180">
        <rect x="34" y="110" width="12" height="70" fill="#6b4c2a" rx="4"/>
        <ellipse cx="40" cy="98"  rx="34" ry="38" fill="#3d6b24"/>
        <ellipse cx="40" cy="76"  rx="26" ry="30" fill="#4e8030"/>
        <ellipse cx="40" cy="56"  rx="18" ry="22" fill="#5a9438"/>
      </svg>
    </div>

    <!-- 木（右） -->
    <div class="tree tree-right">
      <svg width="90" height="180" viewBox="0 0 80 180">
        <rect x="34" y="110" width="12" height="70" fill="#6b4c2a" rx="4"/>
        <ellipse cx="40" cy="98"  rx="34" ry="38" fill="#3d6b24"/>
        <ellipse cx="40" cy="76"  rx="26" ry="30" fill="#4e8030"/>
        <ellipse cx="40" cy="56"  rx="18" ry="22" fill="#5a9438"/>
      </svg>
    </div>

    <!-- 草 -->
    <div class="grass-layer">
      <div class="grass-blades" id="grassBlades"></div>
    </div>

    <main>
      <!-- ヒーロー -->
      <div class="ghibli-card hero-card">
        <span class="deco deco-tl">🌿</span>
        <span class="deco deco-tr">🌸</span>
        <span class="deco deco-bl">🍀</span>
        <span class="deco deco-br">🌼</span>
        <div class="hero-badge">✦ ようこそ ✦</div>
        <h1>Example Website</h1>
        <p>これはウェブサイトです。<br>いろんなサイトへ飛び立とう。</p>
        <div class="mascot-wrapper">
          <img src="computer01_smile.png" alt="笑顔のコンピューター" />
        </div>
      </div>

      <!-- 天気 -->
      <div class="ghibli-card weather-card">
        <span class="deco deco-tr">☁️</span>
        <p class="section-title">今日のお天気</p>
        <div class="weather-inner" id="weather-card">
          <div class="weather-loading" id="weather-loading">🌿 現在地のお天気を調べています…</div>
        </div>
      </div>

      <!-- ポケモン占い -->
      <div class="ghibli-card fortune-card">
        <span class="deco deco-tl">🔮</span>
        <span class="deco deco-br">⭐</span>
        <p class="section-title">今日のポケモン占い</p>
        <button class="fortune-btn" id="fortuneBtn">🌟 今日の運勢を占う</button>
        <div id="fortuneLoading" class="fortune-loading" style="display:none">🌿 占い中…</div>
        <div class="fortune-result" id="fortuneResult">
          <img class="fortune-pokemon-img" id="fortuneImg" src="" alt="" />
          <div class="fortune-number" id="fortuneNumber"></div>
          <div class="fortune-name" id="fortuneName"></div>
          <div class="fortune-types" id="fortuneTypes"></div>
          <div class="fortune-message" id="fortuneMessage"></div>
        </div>
      </div>

      <!-- リンク -->
      <div class="ghibli-card links-card">
        <span class="deco deco-tl">🗺️</span>
        <span class="deco deco-tr">✉️</span>
        <p class="section-title">おでかけ先</p>
        <div class="link-items">
          <a href="https://www.google.com/" class="link-item">
            <span class="link-icon">🔍</span>
            <div class="link-text">
              <strong>Google</strong>
              <span>世界最大の検索エンジン</span>
            </div>
            <span class="link-arrow">→</span>
          </a>
          <a href="https://www.yahoo.co.jp/" class="link-item">
            <span class="link-icon">📰</span>
            <div class="link-text">
              <strong>Yahoo! JAPAN</strong>
              <span>ニュース・検索・ショッピング</span>
            </div>
            <span class="link-arrow">→</span>
          </a>
          <a href="guessgame.html" class="link-item">
            <span class="link-icon">🌰</span>
            <div class="link-text">
              <strong>数当てゲーム</strong>
              <span>1〜20 の数を当ててみよう</span>
            </div>
            <span class="link-arrow">→</span>
          </a>
          <a href="pokemon.html" class="link-item">
            <span class="link-icon">📖</span>
            <div class="link-text">
              <strong>ポケモン図鑑</strong>
              <span>ランダムにポケモンを表示</span>
            </div>
            <span class="link-arrow">→</span>
          </a>
        </div>
      </div>
    </main>

    <footer>© 2026 Example Website 🌱</footer>

    <script>
      // 草を生成
      const blades = document.getElementById("grassBlades");
      for (let i = 0; i < 70; i++) {
        const b = document.createElement("div");
        b.className = "blade";
        b.style.height = (22 + Math.random() * 44) + "px";
        b.style.animationDelay = (Math.random() * 3) + "s";
        blades.appendChild(b);
      }

      // 天気
      const WMO_CODES = {
        0: ["☀️", "快晴"],
        1: ["🌤️", "ほぼ晴れ"], 2: ["⛅", "一部曇り"], 3: ["☁️", "曇り"],
        45: ["🌫️", "霧"], 48: ["🌫️", "霧（着氷）"],
        51: ["🌦️", "霧雨（弱）"], 53: ["🌦️", "霧雨"], 55: ["🌧️", "霧雨（強）"],
        61: ["🌧️", "小雨"], 63: ["🌧️", "雨"], 65: ["🌧️", "大雨"],
        71: ["🌨️", "小雪"], 73: ["❄️", "雪"], 75: ["❄️", "大雪"],
        80: ["🌦️", "にわか雨（弱）"], 81: ["🌧️", "にわか雨"], 82: ["⛈️", "激しいにわか雨"],
        95: ["⛈️", "雷雨"], 96: ["⛈️", "雷雨（ひょう）"], 99: ["⛈️", "激しい雷雨"],
      };

      async function fetchWeather(lat, lon) {
        const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weathercode,windspeed_10m&timezone=auto`;
        const res = await fetch(url);
        if (!res.ok) throw new Error("API error");
        return res.json();
      }

      async function reverseGeocode(lat, lon) {
        const url = `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&accept-language=ja`;
        const res = await fetch(url);
        if (!res.ok) return null;
        const data = await res.json();
        const addr = data.address || {};
        return addr.city || addr.town || addr.village || addr.county || addr.state || null;
      }

      function renderWeather(data, cityName) {
        const cur = data.current;
        const [icon, desc] = WMO_CODES[cur.weathercode] ?? ["🌡️", "不明"];
        const temp = Math.round(cur.temperature_2m);
        const wind = Math.round(cur.windspeed_10m);
        const location = cityName ? `📍 ${cityName}` : "📍 現在地";
        document.getElementById("weather-card").innerHTML = `
          <div class="weather-icon">${icon}</div>
          <div>
            <div class="weather-temp">${temp}°C</div>
            <div class="weather-desc">${desc}</div>
            <div class="weather-location">${location} ・ 風速 ${wind} km/h</div>
          </div>
        `;
      }

      function showError(msg) {
        document.getElementById("weather-card").innerHTML =
          `<div class="weather-error">⚠️ ${msg}</div>`;
      }

      // ポケモン占い
      const FORTUNE_TYPE_COLORS = {
        normal: "#9fa19f", fire: "#e62829", water: "#2980ef", grass: "#3fa129",
        electric: "#fac000", ice: "#3dcef3", fighting: "#ff8000", poison: "#9141cb",
        ground: "#915121", flying: "#81b9ef", psychic: "#ef4179", bug: "#91a119",
        rock: "#afa981", ghost: "#704170", dragon: "#5060e1", dark: "#624d4e",
        steel: "#60a1b8", fairy: "#ef70ef",
      };

      const FORTUNE_TYPE_JA = {
        normal: "ノーマル", fire: "ほのお", water: "みず", grass: "くさ",
        electric: "でんき", ice: "こおり", fighting: "かくとう", poison: "どく",
        ground: "じめん", flying: "ひこう", psychic: "エスパー", bug: "むし",
        rock: "いわ", ghost: "ゴースト", dragon: "ドラゴン", dark: "あく",
        steel: "はがね", fairy: "フェアリー",
      };

      const FORTUNE_MESSAGES = {
        normal:   ["⭐⭐⭐", "平穏な一日になりそう。いつも通りの自分を大切に。"],
        fire:     ["⭐⭐⭐⭐⭐", "情熱が燃えさかる日！新しいことへの挑戦が吉。"],
        water:    ["⭐⭐⭐⭐", "流れに身を任せると、良い縁が引き寄せられるでしょう。"],
        grass:    ["⭐⭐⭐⭐", "自然の中でのんびり過ごすと運気がアップ。"],
        electric: ["⭐⭐⭐⭐⭐", "ひらめきの日！アイデアをどんどん形にして。"],
        ice:      ["⭐⭐⭐", "冷静な判断が光る一日。焦らず、じっくり考えて。"],
        fighting: ["⭐⭐⭐⭐⭐", "勝負運が高まっています。ためらわずに立ち向かおう。"],
        poison:   ["⭐⭐", "ちょっと注意が必要な日。無理せず休むことも大事。"],
        ground:   ["⭐⭐⭐⭐", "地に足をつけた行動が吉。着実に前に進もう。"],
        flying:   ["⭐⭐⭐⭐⭐", "自由な発想が幸運を呼ぶ日。空を見上げてみて。"],
        psychic:  ["⭐⭐⭐⭐⭐", "直感が冴えわたる日！第六感を信じて動こう。"],
        bug:      ["⭐⭐⭐", "小さな積み重ねが大きな成果に。コツコツがんばろう。"],
        rock:     ["⭐⭐⭐⭐", "揺るぎない意志が周りを動かす。信念を持って。"],
        ghost:    ["⭐⭐⭐", "神秘的な出会いがあるかも。不思議な縁を大切に。"],
        dragon:   ["⭐⭐⭐⭐⭐", "大きな夢に向かって走れる日。思い切り羽ばたこう！"],
        dark:     ["⭐⭐", "油断は禁物。慎重な行動が大切な日です。"],
        steel:    ["⭐⭐⭐⭐", "どんな困難も乗り越えられる力があります。"],
        fairy:    ["⭐⭐⭐⭐⭐", "素敵な出会いや再会の予感。笑顔でいると幸運が来る。"],
      };

      document.getElementById("fortuneBtn").addEventListener("click", async () => {
        const btn     = document.getElementById("fortuneBtn");
        const loading = document.getElementById("fortuneLoading");
        const result  = document.getElementById("fortuneResult");

        btn.disabled = true;
        loading.style.display = "block";
        result.classList.remove("show");

        try {
          const id = Math.floor(Math.random() * 898) + 1;
          const [pokemon, species] = await Promise.all([
            fetch(`https://pokeapi.co/api/v2/pokemon/${id}`).then(r => r.json()),
            fetch(`https://pokeapi.co/api/v2/pokemon-species/${id}`).then(r => r.json()),
          ]);

          const jaEntry = species.names.find(n => n.language.name === "ja")
                       || species.names.find(n => n.language.name === "ja-Hrkt");
          const jaName = jaEntry ? jaEntry.name : pokemon.name;
          const img = pokemon.sprites.other?.["official-artwork"]?.front_default
                   || pokemon.sprites.front_default;
          const mainType = pokemon.types[0].type.name;
          const [stars, msg] = FORTUNE_MESSAGES[mainType] || ["⭐⭐⭐", "今日も良い一日を。"];

          document.getElementById("fortuneImg").src    = img;
          document.getElementById("fortuneImg").alt    = jaName;
          document.getElementById("fortuneNumber").textContent = `#${String(id).padStart(3, "0")}`;
          document.getElementById("fortuneName").textContent   = jaName;
          document.getElementById("fortuneTypes").innerHTML    = pokemon.types.map(t => {
            const n = t.type.name;
            return `<span class="fortune-type-badge" style="background:${FORTUNE_TYPE_COLORS[n] || "#888"}">${FORTUNE_TYPE_JA[n] || n}</span>`;
          }).join("");
          document.getElementById("fortuneMessage").innerHTML =
            `<span class="fortune-star">${stars}</span>${msg}`;

          loading.style.display = "none";
          result.classList.add("show");
        } catch {
          loading.textContent = "⚠️ 占いに失敗しました";
        } finally {
          btn.disabled = false;
        }
      });

      navigator.geolocation.getCurrentPosition(
        async ({ coords }) => {
          try {
            const [data, city] = await Promise.all([
              fetchWeather(coords.latitude, coords.longitude),
              reverseGeocode(coords.latitude, coords.longitude),
            ]);
            renderWeather(data, city);
          } catch {
            showError("お天気の取得に失敗しました");
          }
        },
        () => showError("位置情報の取得が拒否されました"),
        { timeout: 8000 }
      );
    </script>
  </body>
</html>
