<!doctype html>
<html lang="ja">
  <head>
    <title>花火</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #000; overflow: hidden; }

      #ui {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 12px;
        z-index: 10;
      }

      .btn {
        font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
        font-size: 0.88rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        padding: 10px 22px;
        border-radius: 999px;
        border: 2px solid #ffffff55;
        background: #ffffff18;
        color: #ffe8a0;
        cursor: pointer;
        backdrop-filter: blur(6px);
        transition: background 0.2s, border-color 0.2s;
      }

      .btn:hover { background: #ffffff28; border-color: #ffe8a0aa; }

      #back {
        position: fixed;
        top: 20px;
        left: 20px;
        z-index: 10;
        font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
        font-size: 0.82rem;
        color: #ffffff55;
        text-decoration: none;
        transition: color 0.2s;
      }

      #back:hover { color: #ffe8a0; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.11.1/lib/p5.min.js"></script>
  </head>
  <body>
    <a href="index.html" id="back">← もどる</a>

    <div id="ui">
      <button class="btn" id="btnLaunch">🎆 打ち上げる</button>
      <button class="btn" id="btnAuto">✨ 自動 ON</button>
    </div>

    <script>
      let rockets = [];
      let sparks  = [];
      let autoMode = false;
      let autoTimer = 0;

      // ===== Rocket =====
      class Rocket {
        constructor(x) {
          this.x = x !== undefined ? x : random(width * 0.15, width * 0.85);
          this.y = height;
          this.vy = random(-18, -13);
          this.vx = random(-1.5, 1.5);
          this.hue = random(360);
          this.trail = [];
          this.done = false;
        }

        update() {
          this.vy += 0.38;
          this.x += this.vx;
          this.y += this.vy;
          this.trail.push(createVector(this.x, this.y));
          if (this.trail.length > 16) this.trail.shift();
          if (this.vy >= 0 && !this.done) {
            this.explode();
            this.done = true;
          }
        }

        explode() {
          const count = floor(random(90, 150));
          const style = floor(random(4)); // 0:球 1:リング 2:ハート 3:花弁
          for (let i = 0; i < count; i++) {
            sparks.push(new Spark(this.x, this.y, this.hue, i, count, style));
          }
          // 二次爆発（40%の確率）
          if (random() < 0.4) {
            const subHue = (this.hue + random(60, 200)) % 360;
            const subN   = floor(random(30, 60));
            for (let i = 0; i < subN; i++) {
              sparks.push(new Spark(this.x, this.y, subHue, i, subN, 0, 0.5));
            }
          }
        }

        draw() {
          noStroke();
          for (let i = 0; i < this.trail.length; i++) {
            const a = map(i, 0, this.trail.length, 0, 200);
            const s = map(i, 0, this.trail.length, 1, 4);
            fill(this.hue, 80, 100, a);
            circle(this.trail[i].x, this.trail[i].y, s);
          }
        }
      }

      // ===== Spark =====
      class Spark {
        constructor(x, y, hue, index, total, style, speedScale = 1) {
          this.x = x;
          this.y = y;
          this.hue = (hue + random(-20, 20)) % 360;
          this.life = 1.0;
          this.decay = random(0.011, 0.022);
          this.gravity = 0.09;
          this.trail = [];

          const angle = (TWO_PI / total) * index + random(-0.08, 0.08);

          if (style === 1) {
            // リング：速さを揃える
            const sp = random(4.5, 5.5) * speedScale;
            this.vx = cos(angle) * sp;
            this.vy = sin(angle) * sp;

          } else if (style === 2) {
            // ハート形
            const t = angle;
            const hx =  16 * pow(sin(t), 3);
            const hy = -(13 * cos(t) - 5 * cos(2*t) - 2 * cos(3*t) - cos(4*t));
            const s  = random(0.28, 0.38) * speedScale;
            this.vx = hx * s;
            this.vy = hy * s;

          } else if (style === 3) {
            // 花弁：サイン変調で速さを変える
            const sp = (3 + 2.5 * abs(sin(index * 5))) * speedScale;
            this.vx = cos(angle) * sp;
            this.vy = sin(angle) * sp;

          } else {
            // 球形（デフォルト）
            const sp = random(2, 7) * speedScale;
            this.vx = cos(angle) * sp;
            this.vy = sin(angle) * sp;
          }
        }

        update() {
          this.trail.push(createVector(this.x, this.y));
          if (this.trail.length > 10) this.trail.shift();
          this.vy += this.gravity;
          this.x  += this.vx;
          this.y  += this.vy;
          this.vx *= 0.97;
          this.vy *= 0.97;
          this.life -= this.decay;
        }

        draw() {
          const alpha = this.life * 255;
          noStroke();
          // 軌跡
          for (let i = 0; i < this.trail.length; i++) {
            const a = map(i, 0, this.trail.length, 0, alpha * 0.45);
            const s = map(i, 0, this.trail.length, 1, 3);
            fill(this.hue, 90, 100, a);
            circle(this.trail[i].x, this.trail[i].y, s);
          }
          // 本体
          fill(this.hue, 60, 100, alpha);
          circle(this.x, this.y, 4.5);
          // 光彩
          fill(this.hue, 30, 100, alpha * 0.25);
          circle(this.x, this.y, 11);
        }

        isDead() { return this.life <= 0; }
      }

      // ===== p5 =====
      function setup() {
        createCanvas(windowWidth, windowHeight);
        colorMode(HSB, 360, 100, 100, 255);
        frameRate(60);
        background(0);
      }

      function draw() {
        // 残像
        fill(0, 0, 0, 28);
        noStroke();
        rect(0, 0, width, height);

        // 自動打ち上げ
        if (autoMode) {
          autoTimer--;
          if (autoTimer <= 0) {
            const n = floor(random(1, 4));
            for (let i = 0; i < n; i++) rockets.push(new Rocket());
            autoTimer = floor(random(20, 55));
          }
        }

        // ロケット
        for (let i = rockets.length - 1; i >= 0; i--) {
          rockets[i].update();
          rockets[i].draw();
          if (rockets[i].done) rockets.splice(i, 1);
        }

        // 火花
        for (let i = sparks.length - 1; i >= 0; i--) {
          sparks[i].update();
          sparks[i].draw();
          if (sparks[i].isDead()) sparks.splice(i, 1);
        }
      }

      function mousePressed() {
        // UI ボタン領域（下部80px）は無視
        if (mouseY > height - 80) return;
        rockets.push(new Rocket(mouseX));
      }

      function windowResized() {
        resizeCanvas(windowWidth, windowHeight);
      }

      // UI ボタン
      document.getElementById("btnLaunch").addEventListener("click", () => {
        const n = floor(random(3, 8));
        for (let i = 0; i < n; i++) rockets.push(new Rocket());
      });

      document.getElementById("btnAuto").addEventListener("click", function() {
        autoMode = !autoMode;
        this.textContent = autoMode ? "✨ 自動 OFF" : "✨ 自動 ON";
        if (autoMode) autoTimer = 5;
      });
    </script>
  </body>
</html>
