<!doctype html>
<html lang="ja">
  <head>
    <title>乃木坂メンバー図鑑</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;700&display=swap");

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --pink: #b09ad8;
        --pink-deep: #7050a8;
        --pink-pale: #ede8f8;
        --rose: #d8cef0;
        --cream: #f8f6ff;
        --gold: #d4a060;
        --gold-pale: #f5e8d8;
        --text: #2e2050;
        --text-mid: #7060a0;
        --text-pale: #b0a0cc;
      }

      body {
        font-family:
          "Shippori Mincho", "Hiragino Mincho ProN", "Yu Mincho", serif;
        min-height: 100vh;
        background: linear-gradient(
          160deg,
          #ede8f8 0%,
          #f0ecff 40%,
          #e8e4f8 70%,
          #ece8ff 100%
        );
        overflow-x: hidden;
        color: var(--text);
      }

      /* ===== 背景装飾 ===== */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background-image:
          radial-gradient(circle at 15% 20%, #c8b8e888 0%, transparent 40%),
          radial-gradient(circle at 85% 70%, #b8c8e888 0%, transparent 40%),
          radial-gradient(circle at 50% 50%, #d8d0f044 0%, transparent 60%);
        pointer-events: none;
        z-index: 0;
      }

      /* ===== 花びら ===== */
      .petals {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 1;
        overflow: hidden;
      }
      .petal {
        position: absolute;
        top: -30px;
        font-size: 1.1rem;
        opacity: 0.55;
        animation: petalFall linear infinite;
      }
      @keyframes petalFall {
        0% {
          transform: translateY(0) rotate(0deg) translateX(0);
          opacity: 0.6;
        }
        50% {
          transform: translateY(50vh) rotate(180deg) translateX(20px);
        }
        100% {
          transform: translateY(105vh) rotate(360deg) translateX(-10px);
          opacity: 0;
        }
      }

      /* ===== ページ ===== */
      .page {
        position: relative;
        z-index: 10;
        max-width: 960px;
        margin: 0 auto;
        padding: 40px 20px 80px;
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(24px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* ===== ヘッダー ===== */
      .header-card {
        background: linear-gradient(160deg, #f8f6ff, #f0ecff);
        border: 2px solid var(--pink);
        border-radius: 24px;
        padding: 28px 32px 24px;
        margin-bottom: 28px;
        box-shadow:
          0 8px 40px #b09ad828,
          0 0 0 6px #ede8f8;
        position: relative;
        animation: fadeUp 0.7s ease both;
        text-align: center;
        overflow: hidden;
      }

      /* レース風上下ライン */
      .header-card::before {
        content: "❧ ✿ ❧ ✿ ❧ ✿ ❧ ✿ ❧ ✿ ❧ ✿ ❧ ✿ ❧";
        position: absolute;
        top: 8px;
        left: 0;
        right: 0;
        text-align: center;
        font-size: 0.7rem;
        color: var(--pink);
        opacity: 0.6;
        letter-spacing: 0.1em;
        overflow: hidden;
      }

      .header-card::after {
        content: "❧ ✿ ❧ ✿ ❧ ✿ ❧ ✿ ❧ ✿ ❧ ✿ ❧ ✿ ❧";
        position: absolute;
        bottom: 64px;
        left: 0;
        right: 0;
        text-align: center;
        font-size: 0.7rem;
        color: var(--pink);
        opacity: 0.4;
        letter-spacing: 0.1em;
        overflow: hidden;
      }

      .header-nav {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 14px;
      }

      .back-link {
        font-size: 0.8rem;
        color: var(--text-mid);
        text-decoration: none;
        transition: color 0.2s;
        letter-spacing: 0.06em;
      }
      .back-link:hover {
        color: var(--pink-deep);
      }

      .member-count {
        font-size: 0.8rem;
        color: var(--text-pale);
        letter-spacing: 0.06em;
      }

      .header-title {
        font-size: clamp(1.3rem, 4vw, 1.9rem);
        font-weight: 700;
        color: var(--pink-deep);
        letter-spacing: 0.18em;
        margin-bottom: 6px;
        text-shadow: 0 2px 8px #e8a0b440;
      }

      .header-sub {
        font-size: 0.78rem;
        color: var(--text-pale);
        letter-spacing: 0.22em;
        margin-bottom: 20px;
      }

      /* 検索 */
      .search-wrap {
        position: relative;
        margin-bottom: 14px;
      }
      .search-wrap::before {
        content: "✦";
        position: absolute;
        left: 14px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--pink);
        font-size: 0.9rem;
        pointer-events: none;
      }
      .search-box {
        width: 100%;
        background: var(--cream);
        border: 2px solid var(--rose);
        border-radius: 999px;
        padding: 10px 18px 10px 36px;
        font-size: 0.92rem;
        font-family: inherit;
        color: var(--text);
        outline: none;
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
      }
      .search-box:focus {
        border-color: var(--pink);
        box-shadow: 0 0 0 4px #e8a0b428;
      }
      .search-box::placeholder {
        color: var(--text-pale);
      }

      /* 世代フィルター */
      .gen-filters {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        justify-content: center;
      }
      .gen-btn {
        font-family: inherit;
        font-size: 0.78rem;
        font-weight: 700;
        padding: 6px 18px;
        border-radius: 999px;
        border: 2px solid var(--pink);
        color: var(--pink-deep);
        background: transparent;
        cursor: pointer;
        letter-spacing: 0.08em;
        transition:
          background 0.2s,
          color 0.2s,
          box-shadow 0.2s,
          transform 0.15s;
      }
      .gen-btn:hover {
        background: #fce8f0;
      }
      .gen-btn:active {
        transform: scale(0.95);
      }
      .gen-btn.active {
        background: linear-gradient(135deg, #e8a0b4, #c8607a);
        border-color: transparent;
        color: white;
        box-shadow: 0 3px 12px #c8607a44;
      }

      /* ===== グリッド ===== */
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(148px, 1fr));
        gap: 16px;
      }

      /* ===== メンバーカード ===== */
      .member-card {
        background: linear-gradient(160deg, #fff8fc, #fdeef8);
        border: 2px solid var(--rose);
        border-radius: 20px;
        overflow: hidden;
        cursor: pointer;
        position: relative;
        box-shadow:
          0 4px 20px #e8a0b420,
          0 0 0 4px #fce8f088;
        transition:
          transform 0.22s,
          box-shadow 0.22s;
        animation: fadeUp 0.4s ease both;
      }
      .member-card:hover {
        transform: translateY(-6px) scale(1.02);
        box-shadow:
          0 14px 36px #c8607a28,
          0 0 0 4px #e8a0b466;
      }

      /* リボン風コーナー */
      .member-card::before {
        content: "✿";
        position: absolute;
        top: 7px;
        right: 9px;
        font-size: 0.7rem;
        color: var(--pink);
        opacity: 0.5;
        z-index: 1;
      }

      .card-avatar {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px 12px 12px;
        background: radial-gradient(circle at 50% 50%, #fff0f8, #fde0ec);
        position: relative;
      }

      .avatar-circle {
        width: 76px;
        height: 76px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow:
          0 4px 16px #c8607a33,
          0 0 0 4px #fff0f8;
        overflow: hidden;
        border: 3px solid white;
      }
      .avatar-circle svg {
        width: 54px;
        height: 54px;
      }

      .card-body {
        padding: 8px 12px 14px;
        border-top: 1px solid #f0d0e0;
        text-align: center;
      }

      .gen-badge {
        display: inline-block;
        font-size: 0.62rem;
        font-weight: 700;
        padding: 2px 10px;
        border-radius: 999px;
        color: white;
        letter-spacing: 0.08em;
        margin-bottom: 6px;
        box-shadow: 0 2px 6px #0002;
      }

      .card-name {
        font-size: 0.9rem;
        font-weight: 700;
        color: var(--text);
        margin-bottom: 3px;
        line-height: 1.3;
        letter-spacing: 0.04em;
      }

      .card-read {
        font-size: 0.62rem;
        color: var(--text-pale);
        letter-spacing: 0.04em;
      }

      /* 空 */
      .empty-msg {
        text-align: center;
        color: var(--text-pale);
        font-size: 0.95rem;
        padding: 48px 0;
        grid-column: 1 / -1;
        letter-spacing: 0.1em;
      }

      /* ===== モーダル ===== */
      .modal-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: #5a284088;
        z-index: 100;
        align-items: center;
        justify-content: center;
        padding: 20px;
        backdrop-filter: blur(4px);
      }
      .modal-overlay.open {
        display: flex;
      }

      .modal {
        background: linear-gradient(160deg, #fff8fc, #fdeef8);
        border: 2px solid var(--pink);
        border-radius: 24px;
        width: min(400px, 100%);
        box-shadow:
          0 20px 60px #c8607a33,
          0 0 0 8px #fce8f0;
        position: relative;
        animation: modalIn 0.3s ease both;
        overflow: hidden;
      }

      @keyframes modalIn {
        from {
          opacity: 0;
          transform: scale(0.9) translateY(20px);
        }
        to {
          opacity: 1;
          transform: scale(1) translateY(0);
        }
      }

      /* モーダル レース上部 */
      .modal::before {
        content: "✿ ❀ ✿ ❀ ✿ ❀ ✿ ❀ ✿ ❀ ✿ ❀ ✿ ❀ ✿ ❀ ✿";
        display: block;
        text-align: center;
        font-size: 0.65rem;
        color: var(--pink);
        opacity: 0.6;
        padding: 6px 0 0;
        letter-spacing: 0.08em;
      }

      .modal-close {
        position: absolute;
        top: 10px;
        right: 14px;
        background: var(--rose);
        border: 2px solid var(--pink);
        border-radius: 50%;
        width: 28px;
        height: 28px;
        font-size: 0.82rem;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--pink-deep);
        transition:
          background 0.15s,
          transform 0.15s;
        z-index: 2;
      }
      .modal-close:hover {
        background: var(--pink);
        color: white;
        transform: rotate(90deg);
      }

      .modal-top {
        padding: 16px 24px 22px;
        text-align: center;
        background: radial-gradient(circle at 50% 50%, #fff0f8, #fde0ec);
        border-bottom: 1px solid #f0d0e0;
        position: relative;
      }

      .modal-top::after {
        content: "— ✦ —";
        display: block;
        color: var(--pink);
        font-size: 0.75rem;
        letter-spacing: 0.3em;
        margin-top: 10px;
        opacity: 0.7;
      }

      .modal-avatar {
        width: 100px;
        height: 100px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow:
          0 6px 24px #c8607a44,
          0 0 0 5px white,
          0 0 0 8px var(--rose);
        margin: 0 auto 14px;
        overflow: hidden;
        animation: bobble 3.5s ease-in-out infinite;
        border: 3px solid white;
      }
      .modal-avatar svg {
        width: 72px;
        height: 72px;
      }

      @keyframes bobble {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-8px);
        }
      }

      .modal-name {
        font-size: 1.45rem;
        font-weight: 700;
        color: var(--text);
        letter-spacing: 0.1em;
        margin-bottom: 4px;
      }

      .modal-read {
        font-size: 0.78rem;
        color: var(--text-pale);
        letter-spacing: 0.1em;
        margin-bottom: 10px;
      }

      .modal-body {
        padding: 20px 24px 28px;
      }

      .info-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .info-box {
        background: var(--cream);
        border: 1.5px solid #f0d0e0;
        border-radius: 14px;
        padding: 12px 14px;
        text-align: center;
        position: relative;
        overflow: hidden;
      }

      .info-box::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 3px;
        background: linear-gradient(
          90deg,
          var(--rose),
          var(--pink),
          var(--rose)
        );
        border-radius: 14px 14px 0 0;
      }

      .info-box .label {
        font-size: 0.64rem;
        color: var(--text-pale);
        letter-spacing: 0.16em;
        text-transform: uppercase;
        margin-bottom: 4px;
      }

      .info-box .value {
        font-size: 1rem;
        font-weight: 700;
        color: var(--text);
        letter-spacing: 0.04em;
      }

      .info-box.full {
        grid-column: span 2;
      }

      /* フッター */
      footer {
        position: relative;
        z-index: 10;
        text-align: center;
        padding: 10px 24px 36px;
        font-size: 0.75rem;
        color: var(--text-pale);
        letter-spacing: 0.12em;
      }

      footer::before {
        content: "✿ ✦ ✿ ✦ ✿";
        display: block;
        margin-bottom: 8px;
        font-size: 0.7rem;
        color: var(--pink);
        opacity: 0.5;
        letter-spacing: 0.3em;
      }
    </style>
  </head>

      function calcAge(born) {
        const [y, m, d] = born.split("/").map(Number);
        const today = new Date(2026, 4, 23);
        let age = today.getFullYear() - y;
        if (
          today.getMonth() + 1 < m ||
          (today.getMonth() + 1 === m && today.getDate() < d)
        )
          age--;
        return age;
      }

      function fmtBorn(born) {
        const [y, m, d] = born.split("/").map(Number);
        return `${y}年${m}月${d}日`;
      }

      let activeGen = 0,
        searchQuery = "";

      function filtered() {
        return MEMBERS.filter((m) => {
          const genOk = activeGen === 0 || m.gen === activeGen;
          const q = searchQuery.trim();
          const nameOk = !q || m.name.includes(q) || m.read.includes(q);
          return genOk && nameOk;
        });
      }

      function renderGrid(members) {
        const grid = document.getElementById("grid");
        grid.innerHTML = "";
        if (members.length === 0) {
          grid.innerHTML = `<div class="empty-msg">🌸 該当するメンバーが見つかりませんでした</div>`;
          document.getElementById("memberCount").textContent = "0名";
          return;
        }
        document.getElementById("memberCount").textContent =
          `${members.length}名`;
        members.forEach((m, i) => {
          const grad = GEN_COLOR[m.gen] || "#e8a0b4";
          const solid = GEN_SOLID[m.gen] || "#e8a0b4";
          const card = document.createElement("div");
          card.className = "member-card";
          card.style.animationDelay = `${i * 0.04}s`;
          card.dataset.idx = MEMBERS.indexOf(m);
          card.innerHTML = `
            <div class="card-avatar">
              <div class="avatar-circle" style="background:${grad}">${girlSvg()}</div>
            </div>
            <div class="card-body">
              <span class="gen-badge" style="background:${grad}">${GEN_LABEL[m.gen]}</span>
              <div class="card-name">${m.name}</div>
              <div class="card-read">${m.read}</div>
            </div>`;
          grid.appendChild(card);
        });
      }

      function update() {
        renderGrid(filtered());
      }

      document.querySelectorAll(".gen-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          document
            .querySelectorAll(".gen-btn")
            .forEach((b) => b.classList.remove("active"));
          btn.classList.add("active");
          activeGen = Number(btn.dataset.gen);
          update();
        });
      });

      document.getElementById("searchBox").addEventListener("input", (e) => {
        searchQuery = e.target.value;
        update();
      });

      function openModal(member) {
        const grad = GEN_COLOR[member.gen] || "#e8a0b4";
        const solid = GEN_SOLID[member.gen] || "#e8a0b4";
        document.getElementById("modalAvatar").style.background = grad;
        document.getElementById("modalAvatar").innerHTML = girlSvg();
        document.getElementById("modalName").textContent = member.name;
        document.getElementById("modalRead").textContent = member.read;
        const badge = document.getElementById("modalGenBadge");
        badge.textContent = GEN_LABEL[member.gen];
        badge.style.background = grad;
        const bloodVal = member.blood === "不明" ? "不明" : `${member.blood}型`;
        document.getElementById("modalInfoGrid").innerHTML = `
          <div class="info-box full">
            <div class="label">生年月日</div>
            <div class="value">${fmtBorn(member.born)}</div>
          </div>
          <div class="info-box">
            <div class="label">年齢</div>
            <div class="value">${calcAge(member.born)}歳</div>
          </div>
          <div class="info-box">
            <div class="label">血液型</div>
            <div class="value">${bloodVal}</div>
          </div>
          <div class="info-box">
            <div class="label">身長</div>
            <div class="value">${member.height}</div>
          </div>
          <div class="info-box">
            <div class="label">出身地</div>
            <div class="value">${member.pref}</div>
          </div>
        `;
        document.getElementById("modalOverlay").classList.add("open");
      }

      function closeModal() {
        document.getElementById("modalOverlay").classList.remove("open");
      }

      document.getElementById("grid").addEventListener("click", (e) => {
        const card = e.target.closest(".member-card[data-idx]");
        if (card) openModal(MEMBERS[card.dataset.idx]);
      });
      document
        .getElementById("modalClose")
        .addEventListener("click", closeModal);
      document.getElementById("modalOverlay").addEventListener("click", (e) => {
        if (e.target === e.currentTarget) closeModal();
      });
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") closeModal();
      });

      update();
    </script>
